name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - migrate-to-vite-react-router
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (skip deployment)'
        required: false
        default: 'false'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          CI: false

      - name: Test secret access
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "❌ SSH_HOST secret is missing"
            exit 1
          else
            echo "✅ SSH_HOST is set"
          fi
          if [ -z "${{ secrets.SSH_USERNAME }}" ]; then
            echo "❌ SSH_USERNAME secret is missing"
            exit 1
          else
            echo "✅ SSH_USERNAME is set"
          fi
          if [ -z "${{ secrets.SSH_PASSWORD }}" ]; then
            echo "❌ SSH_PASSWORD secret is missing"
            exit 1
          else
            echo "✅ SSH_PASSWORD is set"
          fi
          if [ -z "${{ secrets.SSH_REMOTE_PATH }}" ]; then
            echo "❌ SSH_REMOTE_PATH secret is missing"
            exit 1
          else
            echo "✅ SSH_REMOTE_PATH is set"
          fi

      - name: List files in dist before upload
        run: |
          echo "=== Files in dist/ ==="
          ls -la dist/
          echo "=== Files in dist/assets/ ==="
          ls -la dist/assets/ || echo "No assets directory"

      - name: Deploy to Hostinger via SSH using rsync
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 5
          command: |
            sudo apt-get install -y sshpass rsync
            echo "=== Deploying dist/ to public_html ==="
            sshpass -p '${{ secrets.SSH_PASSWORD }}' rsync -avz -e "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -p 65002" ./dist/ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_REMOTE_PATH }}/
            echo "=== Listing uploaded files ==="
            sshpass -p '${{ secrets.SSH_PASSWORD }}' ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -p 65002 ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "ls -la ${{ secrets.SSH_REMOTE_PATH }}/"
