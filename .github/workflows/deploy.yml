name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - migrate-to-vite-react-router
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (skip deployment)'
        required: false
        default: 'false'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          CI: false

      - name: Test secret access
        run: |
          if [ -z "${{ secrets.FTP_SERVER }}" ]; then
            echo "❌ FTP_SERVER secret is missing"
            exit 1
          else
            echo "✅ FTP_SERVER is set"
          fi
          if [ -z "${{ secrets.FTP_USERNAME }}" ]; then
            echo "❌ FTP_USERNAME secret is missing"
            exit 1
          else
            echo "✅ FTP_USERNAME is set"
          fi
          if [ -z "${{ secrets.FTP_PASSWORD }}" ]; then
            echo "❌ FTP_PASSWORD secret is missing"
            exit 1
          else
            echo "✅ FTP_PASSWORD is set"
          fi
          if [ -z "${{ secrets.FTP_PATH }}" ]; then
            echo "❌ FTP_PATH secret is missing"
            exit 1
          else
            echo "✅ FTP_PATH is set"
          fi

      - name: List files in dist before upload
        run: |
          echo "=== Files in dist/ ==="
          ls -la dist/
          echo "=== Files in dist/assets/ ==="
          ls -la dist/assets/ || echo "No assets directory"

      - name: Deploy to Hostinger via FTP using lftp
        run: |
          sudo apt-get install -y lftp
          echo "=== Deploying via lftp ==="
          lftp -c "
            set ftp:ssl-allow no;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }}:21;
            cd ${{ secrets.FTP_PATH }};
            mirror -R --delete --verbose ./dist/ .;
            bye
          "
