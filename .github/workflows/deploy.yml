name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - migrate-to-vite-react-router
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (skip deployment)'
        required: false
        default: 'false'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          CI: false

      - name: Test secret access
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "❌ SSH_HOST secret is missing"
            exit 1
          else
            echo "✅ SSH_HOST is set"
          fi
          if [ -z "${{ secrets.SSH_USERNAME }}" ]; then
            echo "❌ SSH_USERNAME secret is missing"
            exit 1
          else
            echo "✅ SSH_USERNAME is set"
          fi
          if [ -z "${{ secrets.SSH_PASSWORD }}" ]; then
            echo "❌ SSH_PASSWORD secret is missing"
            exit 1
          else
            echo "✅ SSH_PASSWORD is set"
          fi
          if [ -z "${{ secrets.SSH_REMOTE_PATH }}" ]; then
            echo "❌ SSH_REMOTE_PATH secret is missing"
            exit 1
          else
            echo "✅ SSH_REMOTE_PATH is set"
          fi

      - name: List files in dist before upload
        run: |
          echo "=== Files in dist/ ==="
          ls -la dist/
          echo "=== Files in dist/assets/ ==="
          ls -la dist/assets/ || echo "No assets directory"

      - name: Deploy to Hostinger via SSH
        uses: easingthemes/ssh-deploy@v4.1.8
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PASSWORD }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_PORT: 65002
          REMOTE_USER: ${{ secrets.SSH_USERNAME }}
          TARGET: ${{ secrets.SSH_REMOTE_PATH }}
          SOURCE: dist/
